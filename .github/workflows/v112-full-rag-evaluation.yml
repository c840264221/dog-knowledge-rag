name: V1.12 Full RAG Evaluation

on:
  workflow_dispatch:
  schedule:
    # 每周一香港时间 02:00 执行，cron 使用 UTC 时间。
    - cron: "0 18 * * 0"

permissions:
  contents: read

concurrency:
  group: full-rag-evaluation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-rag-evaluation:
    name: Full RAG Evaluation and Regression Gate
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      PYTHONUTF8: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      HF_HUB_DISABLE_TELEMETRY: "1"
      TOKENIZERS_PARALLELISM: "false"
      EMBEDDING_PROVIDER: huggingface
      EMBEDDING_MODEL_NAME: BAAI/bge-small-zh
      EMBEDDING_DEVICE: cpu
      EMBEDDING_MEMORY_PROVIDER: huggingface
      EMBEDDING_MEMORY_MODEL_NAME: BAAI/bge-small-zh
      EMBEDDING_MEMORY_DEVICE: cpu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-ci.txt

      - name: Cache embedding model
        uses: actions/cache@v4
        with:
          path: models_cache
          key: bge-small-zh-${{ runner.os }}-v1

      - name: Display environment
        shell: pwsh
        run: |
          python --version
          python -m pip --version

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-ci.txt

      - name: Verify RAG source documents
        shell: pwsh
        run: |
          $documents = Get-ChildItem -Path data/dog_markdown -File -Recurse -Filter *.md
          if ($documents.Count -eq 0) {
            throw "No RAG source documents were found."
          }
          Write-Output "RAG source document count: $($documents.Count)"

      - name: Rebuild Chroma index
        shell: pwsh
        run: |
          python -m scripts.rag.rebuild_dog_rag_index `
            --data-dir data/dog_markdown `
            --vector-store-provider vectorstore `
            --vector-store-attr db `
            --batch-size 64 `
            --overwrite-existing

      - name: Run full RAG evaluation quality gate
        shell: pwsh
        run: |
          python -m scripts.evaluation.evaluate_v112_all --profile full

      - name: Compare evaluation with V1.12 baseline
        shell: pwsh
        run: |
          python -m scripts.evaluation.compare_v113_evaluation_baseline

      - name: Prepare full evaluation artifacts
        if: always()
        shell: pwsh
        run: |
          $artifactDir = "evaluation/artifacts/full-rag"
          $jsonReport = "evaluation/reports/v112_agent_evaluation_report.json"
          $markdownReport = "evaluation/reports/v112_agent_evaluation_report.md"
          $regressionJsonReport = "evaluation/reports/v113_evaluation_regression_report.json"
          $regressionMarkdownReport = "evaluation/reports/v113_evaluation_regression_report.md"
          New-Item -ItemType Directory -Path $artifactDir -Force | Out-Null

          $diagnostics = @(
            "workflow=V1.12 Full RAG Evaluation"
            "run_id=$env:GITHUB_RUN_ID"
            "run_number=$env:GITHUB_RUN_NUMBER"
            "commit_sha=$env:GITHUB_SHA"
            "json_report_found=$(Test-Path -LiteralPath $jsonReport)"
            "markdown_report_found=$(Test-Path -LiteralPath $markdownReport)"
            "regression_json_report_found=$(Test-Path -LiteralPath $regressionJsonReport)"
            "regression_markdown_report_found=$(Test-Path -LiteralPath $regressionMarkdownReport)"
          )
          $diagnostics | Set-Content `
            -LiteralPath "$artifactDir/artifact-diagnostics.txt" `
            -Encoding UTF8

          if (Test-Path -LiteralPath $jsonReport) {
            Copy-Item -LiteralPath $jsonReport -Destination $artifactDir -Force
          } else {
            Write-Warning "JSON evaluation report was not generated: $jsonReport"
          }

          if (Test-Path -LiteralPath $markdownReport) {
            Copy-Item -LiteralPath $markdownReport -Destination $artifactDir -Force
          } else {
            Write-Warning "Markdown evaluation report was not generated: $markdownReport"
          }

          if (Test-Path -LiteralPath $regressionJsonReport) {
            Copy-Item -LiteralPath $regressionJsonReport -Destination $artifactDir -Force
          } else {
            Write-Warning "JSON regression report was not generated: $regressionJsonReport"
          }

          if (Test-Path -LiteralPath $regressionMarkdownReport) {
            Copy-Item -LiteralPath $regressionMarkdownReport -Destination $artifactDir -Force
          } else {
            Write-Warning "Markdown regression report was not generated: $regressionMarkdownReport"
          }

          Get-ChildItem -LiteralPath $artifactDir | Select-Object Name, Length

      - name: Publish full evaluation summary
        if: always()
        shell: pwsh
        run: |
          $reportPath = "evaluation/reports/v112_agent_evaluation_report.md"
          if (Test-Path -LiteralPath $reportPath) {
            Get-Content -LiteralPath $reportPath -Raw -Encoding UTF8 |
              Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          } else {
            @(
              "# V1.12 Full RAG Evaluation"
              ""
              "> Full evaluation report was not generated. Check the artifact diagnostics and failed step logs."
            ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          }

          $regressionReportPath = "evaluation/reports/v113_evaluation_regression_report.md"
          if (Test-Path -LiteralPath $regressionReportPath) {
            Get-Content -LiteralPath $regressionReportPath -Raw -Encoding UTF8 |
              Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          } else {
            @(
              ""
              "# V1.13 Evaluation Regression Report"
              ""
              "> Regression report was not generated. Check the baseline comparison step and artifact diagnostics."
            ) | Add-Content -LiteralPath $env:GITHUB_STEP_SUMMARY -Encoding UTF8
          }

      - name: Upload full evaluation reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: v113-full-rag-regression-report-${{ github.run_number }}
          path: evaluation/artifacts/full-rag
          if-no-files-found: error
          retention-days: 30
